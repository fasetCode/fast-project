<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8"  />
    <link rel="icon" href="%VITE_APP_LOGO%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>
    <style>
      :root {
        color-scheme: light;
        --boot-bg: #020617;
        --boot-panel: rgba(15, 23, 42, 0.72);
        --boot-border: rgba(148, 163, 184, 0.2);
        --boot-text: #e2e8f0;
        --boot-muted: #94a3b8;
        --boot-primary: #3b82f6;
        --boot-secondary: #8b5cf6;
        --boot-accent: #22d3ee;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 34%),
          radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.26), transparent 30%),
          linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
      }

      body {
        overflow: hidden;
      }

      #app {
        min-height: 100vh;
      }

      .boot-screen {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 100vh;
        overflow: hidden;
        isolation: isolate;
      }

      .boot-orb {
        position: absolute;
        border-radius: 999px;
        filter: blur(80px);
        opacity: 0.7;
        animation: bootFloat 12s ease-in-out infinite alternate;
      }

      .boot-orb.one {
        top: -120px;
        left: -80px;
        width: 320px;
        height: 320px;
        background: rgba(59, 130, 246, 0.55);
      }

      .boot-orb.two {
        right: -120px;
        bottom: -120px;
        width: 360px;
        height: 360px;
        background: rgba(139, 92, 246, 0.48);
        animation-delay: -4s;
      }

      .boot-orb.three {
        top: 50%;
        left: 50%;
        width: 220px;
        height: 220px;
        background: rgba(34, 211, 238, 0.25);
        transform: translate(-50%, -50%);
        animation-delay: -8s;
      }

      .boot-card {
        position: relative;
        z-index: 1;
        width: min(92vw, 460px);
        padding: 40px 32px 30px;
        border: 1px solid var(--boot-border);
        border-radius: 28px;
        background: var(--boot-panel);
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
        color: var(--boot-text);
        text-align: center;
      }

      .boot-logo-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        margin: 0 auto 22px;
        display: grid;
        place-items: center;
      }

      .boot-logo-ring,
      .boot-logo-ring::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      .boot-logo-ring {
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: radial-gradient(circle, rgba(59, 130, 246, 0.14), rgba(15, 23, 42, 0.12));
      }

      .boot-logo-ring::after {
        inset: 8px;
        border: 2px solid transparent;
        border-top-color: var(--boot-primary);
        border-right-color: var(--boot-secondary);
        animation: bootSpin 1.2s linear infinite;
      }

      .boot-logo {
        width: 42px;
        height: 42px;
        filter: drop-shadow(0 6px 16px rgba(134, 59, 255, 0.35));
      }

      .boot-title {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .boot-subtitle {
        margin: 12px 0 0;
        color: var(--boot-muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .boot-progress {
        position: relative;
        width: 100%;
        height: 6px;
        margin: 28px 0 16px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.14);
        overflow: hidden;
      }

      .boot-progress::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--boot-primary), var(--boot-secondary), var(--boot-accent));
        box-shadow: 0 0 24px rgba(59, 130, 246, 0.45);
        animation: bootLoading 1.5s ease-in-out infinite;
      }

      .boot-status {
        display: flex;
        justify-content: center;
        gap: 8px;
        align-items: center;
        color: #cbd5e1;
        font-size: 14px;
      }

      .boot-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
        animation: bootBlink 1.4s ease-in-out infinite;
      }

      .boot-dot:nth-child(2) {
        animation-delay: 0.18s;
      }

      .boot-dot:nth-child(3) {
        animation-delay: 0.36s;
      }

      .boot-tip {
        margin-top: 16px;
        color: rgba(148, 163, 184, 0.9);
        font-size: 12px;
        letter-spacing: 0.04em;
      }

      @keyframes bootSpin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes bootLoading {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(300%);
        }
      }

      @keyframes bootBlink {
        0%,
        80%,
        100% {
          transform: scale(0.7);
          opacity: 0.35;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes bootFloat {
        from {
          transform: translate3d(0, 0, 0) scale(1);
        }
        to {
          transform: translate3d(0, 24px, 0) scale(1.08);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-screen">
        <div class="boot-orb one"></div>
        <div class="boot-orb two"></div>
        <div class="boot-orb three"></div>

        <div class="boot-card">
          <div class="boot-logo-wrap">
            <div class="boot-logo-ring"></div>
            <img class="boot-logo" src="%VITE_APP_LOGO%" alt="logo" />
          </div>

          <h1 class="boot-title">%VITE_APP_TITLE%</h1>
          <p class="boot-subtitle">
            正在加载系统资源与权限路由，请稍候进入控制台
          </p>

          <div class="boot-progress" aria-hidden="true"></div>

          <div class="boot-status" aria-live="polite">
            <span>启动中</span>
            <span class="boot-dot"></span>
            <span class="boot-dot"></span>
            <span class="boot-dot"></span>
          </div>

          <div class="boot-tip">Preparing routes, permissions and workspace</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
