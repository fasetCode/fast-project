server:
  port: 2030

spring:
  threads:
    virtual:
      enabled: true
  jmx:
    enabled: false
  datasource:

    url: jdbc:postgresql://127.0.0.1:5432/fast-customer-plugin
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update  # none 已经有表，不要自动建表
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        implicitly_quoted_identifiers: false
        use_sql_comments: false
    open-in-view: false