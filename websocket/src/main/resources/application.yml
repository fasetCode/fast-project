# Netty WebSocket 服务端配置
netty:
  websocket:
    # 监听端口
    port: 8888
    # 握手路径 (ws://localhost:8888/ws)
    path: /ws

# Spring Boot 日志配置



spring:
  datasource:
    url: jdbc:h2:file:./data/ws-gateway
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 2020